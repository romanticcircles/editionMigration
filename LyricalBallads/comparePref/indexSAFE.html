        <script>
            // ── Universal Synchronized scrolling ──────────────────────────────────────
let syncEnabled = true;
let isSyncing = false; // The "Lock" to prevent circular loops
let syncTimer = null;

const frameIds = ['f1', 'f2', 'f3'];

function toggleSync() {
    syncEnabled = !syncEnabled;
    const btn = document.getElementById('toggleSync');
    btn.textContent = `sync scroll: ${syncEnabled ? 'on' : 'off'}`;
    btn.classList.toggle('active-toggle', syncEnabled);
}

/**
 * Finds the chunk currently at the top of a specific document
 */
function getActiveChunkId(doc) {
    const chunks = Array.from(doc.querySelectorAll('[id^="chunk"]'));
    if (!chunks.length) return null;

    const threshold = 60; // Pixels from top
    let activeId = chunks[0].id;

    for (const el of chunks) {
        const rect = el.getBoundingClientRect();
        if (rect.top <= threshold) {
            activeId = el.id;
        } else {
            break;
        }
    }
    return activeId;
}

/**
 * The core sync function triggered by any frame
 */
function handleFrameScroll(sourceFrameId) {
    if (!syncEnabled || isSyncing) return;

    clearTimeout(syncTimer);
    syncTimer = setTimeout(() => {
        isSyncing = true; // Lock!

        const sourceFrame = document.getElementById(sourceFrameId);
        const sDoc = sourceFrame.contentDocument || sourceFrame.contentWindow.document;
        const targetChunkId = getActiveChunkId(sDoc);

        if (targetChunkId) {
            frameIds.forEach(id => {
                if (id === sourceFrameId) return; // Don't scroll the source

                const targetFrame = document.getElementById(id);
                try {
                    const tDoc = targetFrame.contentDocument || targetFrame.contentWindow.document;
                    const targetEl = tDoc.getElementById(targetChunkId);
                    
                    if (targetEl) {
                        // Handle placeholders if they exist
                        if (targetEl.dataset.placeholder) {
                            targetEl.style.display = 'block';
                        }
                        targetEl.scrollIntoView({ behavior: 'auto', block: 'start' });
                    }
                } catch (e) {
                    console.warn(`Cannot sync frame ${id}:`, e);
                }
            });
        }

        // Release lock after a brief delay to allow the programmatic scrolls to finish
        setTimeout(() => { isSyncing = false; }, 50);
    }, 50); 
}

/**
 * Attaches listeners to an iframe once it's loaded
 */
function initFrameSync(id) {
    const iframe = document.getElementById(id);
    iframe.addEventListener('load', () => {
        try {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.addEventListener('scroll', () => handleFrameScroll(id), { passive: true });
        } catch (e) {
            console.error("CORS Error: Ensure you are running on a server (localhost/http).");
        }
    });
}

// ── Menu and Initialization ──────────────────────────────────────────────

function setupApp() {
    const $ = (id) => document.getElementById(id);

    // Initialize sync for all 3
    frameIds.forEach(initFrameSync);

    function wire(dropId, descId, frameId) {
        const dd = $(dropId);
        const desc = $(descId);
        const fr = $(frameId);

        dd.addEventListener('change', () => {
            const opt = dd.options[dd.selectedIndex];
            if (opt && opt.value) {
                fr.src = opt.value;
                desc.textContent = opt.getAttribute('data-description') || '';
            }
        });
    }

    wire('dropdown1', 'description1', 'f1');
    wire('dropdown3', 'description3', 'f3');
    wire('dropdown2', 'description2', 'f2');

    // Handle URL Params
    const params = new URLSearchParams(window.location.search);
    if (params.get('left'))   { $('dropdown1').value = params.get('left');   $('dropdown1').dispatchEvent(new Event('change')); }
    if (params.get('middle')) { $('dropdown3').value = params.get('middle'); $('dropdown3').dispatchEvent(new Event('change')); }
    if (params.get('right'))  { $('dropdown2').value = params.get('right');  $('dropdown2').dispatchEvent(new Event('change')); }
}

document.addEventListener('DOMContentLoaded', setupApp);

function setFrames(n) {
    const table = document.getElementById('framesTable');
    table.classList.toggle('two-frames', n === 2);
    document.getElementById('toggle2').classList.toggle('active-toggle', n === 2);
    document.getElementById('toggle3').classList.toggle('active-toggle', n === 3);
}</script>
