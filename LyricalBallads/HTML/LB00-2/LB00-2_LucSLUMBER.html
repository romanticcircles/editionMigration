      <div class="wrapper"><span class="newPage"></span><span class="pageTopCenter">53</span><br /><br /><span class="stzNbr">1</span><p class="verse"><span class="l"><span class="ltext">A slumber did my spirit seal,</span><span class="lno">1</span></span><span class="l"><span class="ltext indent"> I had no human fears :</span><span class="lno">2</span></span><span class="l"><span class="ltext">She seem’d a thing that could not feel</span><span class="lno">3</span></span><span class="l"><span class="ltext indent"> The touch of earthly years.</span><span class="lno">4</span></span></p><span class="stzNbr">2</span><p class="verse"><span class="l"><span class="ltext">No motion has she now, no force</span><span class="lno">5</span></span><span class="l"><span class="ltext indent"> She neither hears nor sees</span><span class="lno">6</span></span><span class="l"><span class="ltext">Roll’d round in earth’s diurnal course</span><span class="lno">7</span></span><span class="l"><span class="ltext indent"> With rocks and stones and trees !</span><span class="lno">8</span></span></p>
